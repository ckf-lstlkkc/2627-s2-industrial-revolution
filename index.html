<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百萬富翁：工業革命挑戰賽</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #1b2735;
            --gold: #f1c40f;
            --text-light: #ecf0f1;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --btn-bg: #1e3799;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: var(--panel-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #090a0f;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--gold);
            font-size: 2em;
            margin-bottom: 20px;
        }

        .login-group {
            margin: 15px 0;
            text-align: left;
        }
        
        .login-group label {
            display: block;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .login-group input {
            width: 95%;
            padding: 12px;
            font-size: 16px;
            background: #fff;
            border: 2px solid var(--gold);
            border-radius: 8px;
            color: #000;
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold);
            color: #000;
            font-weight: bold;
            font-size: 18px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .btn:hover { background: #e67e22; }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }

        .header-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(241, 196, 15, 0.3);
            padding-bottom: 10px;
        }
        
        .timer { font-size: 24px; color: #e74c3c; }

        .question-box {
            font-size: 22px;
            font-weight: bold;
            background: #1c2833;
            padding: 25px;
            border: 2px solid #3498db;
            border-radius: 10px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media(max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background: var(--btn-bg);
            color: #fff;
            border: 2px solid var(--gold);
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
        }
        
        .option-btn:hover { background: #2980b9; }
        .option-btn.correct { background: var(--correct); border-color: #27ae60; }
        .option-btn.wrong { background: var(--wrong); border-color: #c0392b; }

        .fill-input {
            width: 80%;
            padding: 15px;
            font-size: 20px;
            text-align: center;
            border: 2px solid var(--gold);
            border-radius: 8px;
            background: #fff;
            color: #000;
        }

        .rationale-box {
            margin-top: 20px;
            padding: 15px;
            background: #27ae60;
            border-radius: 5px;
            text-align: left;
            font-size: 16px;
            display: none;
            color: #fff;
        }

        .next-btn-container { margin-top: 20px; display: none; }

        .certificate {
            background: #fdfbfb;
            color: #2c3e50;
            padding: 20px;
            border: 5px double var(--gold);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* 排行榜樣式 */
        .leaderboard-box {
            margin-top: 25px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--gold);
        }
        .leaderboard-title {
            color: var(--gold);
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .leaderboard-table th { color: var(--gold); }
        .top-rank { color: #f39c12; font-weight: bold; }

        .hide { display: none; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>👑 工業革命百萬富翁</h1>
    <p>請填寫登入資訊以開始挑戰</p>
    
    <div class="login-group">
        <label>班別與學號 (例: 2A 05)</label>
        <input type="text" id="student-class" placeholder="請輸入班別學號">
    </div>
    <div class="login-group">
        <label>真實姓名</label>
        <input type="text" id="student-name" placeholder="請輸入姓名">
    </div>
    <div class="login-group">
        <label>學校專屬通關密碼 (校外人士防護)</label>
        <input type="password" id="school-pass" placeholder="請輸入老師給的通關密碼">
    </div>
    
    <button class="btn" id="start-btn">▶ 開始挑戰</button>
</div>

<div class="container hide" id="game-screen">
    <div class="header-bar">
        <div>📝 題目: <span id="q-counter">1</span> / 20</div>
        <div>🏆 分數: <span id="score-display">0</span></div>
        <div class="timer">⏳ <span id="time-left">30</span>s</div>
    </div>
    
    <div id="question-area" class="question-box">題目載入中...</div>
    <div id="options-area"></div>
    <div id="rationale-area" class="rationale-box"></div>
    
    <div id="next-btn-area" class="next-btn-container">
        <button class="btn" id="next-btn">下一題 ➡️</button>
    </div>
</div>

<div class="container hide" id="result-screen">
    <h1>🎉 挑戰完成！
