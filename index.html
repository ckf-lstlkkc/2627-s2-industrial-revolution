<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>百萬富翁：工業革命挑戰賽</title>
    <style>
        :root { --bg-color: #0b0e14; --panel-bg: #1b2735; --gold: #f1c40f; --text-light: #ecf0f1; --correct: #2ecc71; --wrong: #e74c3c; --btn-bg: #1e3799; }
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: var(--panel-bg); color: var(--text-light); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 800px; width: 100%; background: #090a0f; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; box-sizing: border-box; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 2em; margin-bottom: 20px; }
        .login-group { margin: 15px 0; text-align: left; }
        .login-group label { display: block; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        .login-group input { width: 95%; padding: 12px; font-size: 16px; background: #fff; border: 2px solid var(--gold); border-radius: 8px; color: #000; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; font-weight: bold; font-size: 18px; padding: 12px 30px; border: none; border-radius: 30px; cursor: pointer; margin-top: 15px; }
        .btn:hover { background: #e67e22; }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        .header-bar { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; color: var(--gold); margin-bottom: 20px; border-bottom: 1px solid rgba(241, 196, 15, 0.3); padding-bottom: 10px; }
        .timer { font-size: 24px; color: #e74c3c; }
        .question-box { font-size: 22px; font-weight: bold; background: #1c2833; padding: 25px; border: 2px solid #3498db; border-radius: 10px; margin-bottom: 25px; line-height: 1.5; white-space: pre-wrap; text-align: left;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media(max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        .option-btn { background: var(--btn-bg); color: #fff; border: 2px solid var(--gold); padding: 15px; font-size: 18px; border-radius: 8px; cursor: pointer; text-align: left; }
        .option-btn:hover { background: #2980b9; }
        .option-btn.correct { background: var(--correct); border-color: #27ae60; }
        .option-btn.wrong { background: var(--wrong); border-color: #c0392b; }
        .fill-input { width: 80%; padding: 15px; font-size: 20px; text-align: center; border: 2px solid var(--gold); border-radius: 8px; background: #fff; color: #000; }
        .rationale-box { margin-top: 20px; padding: 15px; background: #27ae60; border-radius: 5px; text-align: left; font-size: 16px; display: none; color: #fff; }
        .next-btn-container { margin-top: 20px; display: none; }
        .certificate { background: #fdfbfb; color: #2c3e50; padding: 20px; border: 5px double var(--gold); border-radius: 10px; margin-bottom: 20px; }
        .leaderboard-box { margin-top: 25px; background: #111; padding: 20px; border-radius: 10px; border: 1px solid var(--gold); }
        .leaderboard-title { color: var(--gold); font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .leaderboard-table { width: 100%; border-collapse: collapse; color: #fff; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        .leaderboard-table th { color: var(--gold); }
        .top-rank { color: #f39c12; font-weight: bold; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>👑 工業革命百萬富翁</h1>
    <p>請填寫登入資訊以開始挑戰</p>
    <div class="login-group">
        <label>班別與學號 (例: 2A 05)</label>
        <input type="text" id="student-class" placeholder="請輸入班別學號">
    </div>
    <div class="login-group">
        <label>真實姓名</label>
        <input type="text" id="student-name" placeholder="請輸入姓名">
    </div>
    <div class="login-group">

    </div>
    <button class="btn" id="start-btn">▶ 開始挑戰</button>
</div>

<div class="container hide" id="game-screen">
    <div class="header-bar">
        <div>📝 題目: <span id="q-counter">1</span> / 20</div>
        <div>🏆 分數: <span id="score-display">0</span></div>
        <div class="timer">⏳ <span id="time-left">30</span>s</div>
    </div>
    <div id="question-area" class="question-box">題目載入中...</div>
    <div id="options-area"></div>
    <div id="rationale-area" class="rationale-box"></div>
    <div id="next-btn-area" class="next-btn-container">
        <button class="btn" id="next-btn">下一題 ➡️</button>
    </div>
</div>

<div class="container hide" id="result-screen">
    <h1>🎉 挑戰完成！</h1>
    <div class="certificate" id="certificate-box">
        <h2 style="color: #d35400;">🏆 榮譽成績證書</h2>
        <p><strong>姓名：</strong><span id="cert-name"></span> (<span id="cert-class"></span>)</p>
        <p><strong>最終得分：</strong><span id="cert-score" style="font-size: 24px; color: #c0392b; font-weight:bold;"></span> 分</p>
        <p><strong>總作答耗時：</strong><span id="cert-time"></span> 秒</p>
        <p id="upload-status" style="color: #3498db; font-weight: bold; margin-top: 10px;">⏳ 正在將成績同步至雲端...</p>
    </div>
    <button class="btn" id="copy-btn">📋 一鍵複製成績</button>
    <button class="btn" id="reload-btn" style="background: #3498db;">🔄 重新開始</button>
    <div class="leaderboard-box">
        <div class="leaderboard-title">🏆 雲端即時前 10 名排行榜</div>
        <table class="leaderboard-table">
            <thead>
                <tr><th>名次</th><th>班別</th><th>姓名</th><th>分數</th><th>耗時</th></tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="5">正在載入最新排名...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>

window.onload = function() {

// 老師的 45 題完整單選+複選題庫 [cite: 323]
const allMC = [
    {q:"工業革命時期，人類社會的生產模式發生了根本性轉變，這個時代在歷史上又被稱為什麼？", o:["蒸汽時代","機器時代","資訊時代","鐵器時代"], a:1},
    {q:"工業革命最先在英國展開，這場變革大約發生在以下哪一個歷史時期？", o:["十七世紀中葉至十八世紀末","十九世紀中葉至二十世紀末","十八世紀中葉至十九世紀中","十八世紀中葉至十九世紀末"], a:3},
    {q:"在工業革命期間，歐洲各國湧現了大量改變人類生活的重大科技成果。以下哪一組全屬於工業革命時期的發明？", o:["珍妮紡紗機、改良蒸汽機、蒸汽鐵路機車","印刷術、指南針、火藥","網際網路、智慧型手機、核能發電廠","柴油汽車、地鐵列車、飛機"], a:0},
    {q:"隨著技術變革，歐洲的經濟結構發生重大轉變。這裡所指的「技術變革」核心是指什麼？", o:["機器逐步取代人力、畜力等成為生產動力","莊園制度的解體與自由貿易的普及","行會制度的建立與海外市場的開拓","政府全面接管民間手工藝作坊"], a:0},
    {q:"「工業化」為歐洲國家帶來了結構性的經濟轉變，其具體表現是：", o:["國家開始依賴海外殖民地提供糧食","商業貿易完全取代了製造業","工業取代了傳統農業成為國家的經濟支柱","金融借貸成為城鎮居民唯一的生計"], a:2},
    {q:"在工業革命引進機器生產後，相較於歐洲傳統的家庭手工業，這種新興的機器大規模生產具備了什麼最顯著的優勢？", o:["生產過程完全不需要任何原料的投入","產量巨大且生產過程不易受到自然環境限制","能自發保障底層勞工獲得豐厚的工資福利","商品完全由政府定價並實行全國免費配給"], a:1},
    {q:"十八世紀英國地主收回農民租田並圍築土地，迫使大量失去生計的農民湧入城市，這為當時新興的工廠發展提供了甚麼關鍵元素？", o:["豐富的天然工業原材料","先進的科學理論支持","廣闊的海外銷售市場","充足的廉價勞動力"], a:3},
    {q:"到了十九世紀初至中葉，工業革命的技術與生產模式開始從英國傳播到以下哪些地區？", o:["其他歐洲國家及美國","亞洲的清朝與日本","非洲中南部與拉丁美洲","大洋洲的澳洲與新西蘭"], a:0},
    {q:"為了配合工業大量生產後對貨物運送速度的需求，工業革命期間在水路運輸方面出現了什麼重大建設？", o:["修築跨海大橋","建立大型現代化貨櫃碼頭","全面禁止傳統木船航行","大量開鑿運河連接河流"], a:3},
    {q:"在工業革命後興起的近代經濟體制中，掌握了機器、廠房與礦產等生產資源，並以此僱用勞工賺取利潤的人被稱為：", o:["專業人士","中產階級","資本家","貴族地主"], a:2},
    {q:"工業生產變革後，為了在最短時間內製造出最多、質素最平均的商品，生產過程普遍採用了什麼運作模式？", o:["師徒制","分工制","世襲制","自由放任制"], a:1},
    {q:"工業革命後出現了清晰的社會階級劃分。其中新興的教師、記者以及工廠中的管理人員，在當時屬於哪一個階級？", o:["中產階級","資產階級","工人階級","貴族階級"], a:0},
    {q:"工業革命後，哪一個社會階級因為掌握了巨額財富，甚至能夠在政治上發揮強大的影響力，進而動搖傳統貴族的統治？", o:["中產階級","工人階級","農民階級","資產階級"], a:3},
    {q:"隨著資產階級與工人階級的矛盾加劇，部份學者開始反對資本家對勞工的剝削，進而提出了什麼新興的政治與經濟主張？", o:["自由主義","民族主義","社會主義","重商主義"], a:2},
    {q:"十九世紀中葉以後，西方工業強國向海外大肆擴張並奪取殖民地。他們這種擴張行為的最核心目的是甚麼？", o:["傳播西方先進的機器生產技術","獲取生產原料及拓展海外市場","協助亞非兩洲國家發展現代工業","促進世界各國的平等經貿往來"], a:1},
    {q:"工業革命期間，陸路交通工具出現了革命性的技術突破。當時發明瞭以下哪一種由非生物動力推動的現代鐵道運輸工具？", o:["柴油客車","蒸汽鐵路機車","地鐵列車","馬拉軌道車"], a:1},
    {q:"十九世紀時，哪一位歷史人物在醫學與公共衛生範疇做出了巨大貢獻，不僅提升了醫院的衛生水平，更創立了護士學校？", o:["歐文","羅伯特·皮爾","南丁格爾","詹姆斯·瓦特"], a:2},
    {q:"在工業革命帶來的新型工業生產模式下，生產的主要場所發生了什麼轉變？", o:["機器大規模生產取代了傳統的家庭或小型工作坊生產","從大型國營作坊轉為家庭式手工生產","從城市集中生產轉回農村莊園集體勞作","完全依靠海外殖民地的手工作坊供貨"], a:0},
    {q:"早期工業城鎮缺乏長遠規劃，工廠排放大量濃煙，這導致當時的工業城市普遍面臨什麼嚴重的問題？", o:["勞動力嚴重短缺","土地過度荒廢","糧食生產過剩","嚴重的環境污染與公共衛生惡劣"], a:3},
    {q:"十九世紀時，有一位德意志思想家公開反對資本家對工人階級的剝削，並與他人合著政治綱領，積極資助反對私有制的理論研究。這位思想家是誰？", o:["恩格斯","詹姆斯·瓦特","南丁格爾","亞當·斯密"], a:0},
    {q:"到二十世紀初，隨著西方列強在國際經貿與殖民地爭奪上的白熱化，全球局勢出現了什麼發展？", o:["列強達成全面裁軍協議","西方國家自願放棄所有海外殖民地","國際衝突不斷增加，局勢漸趨緊張","全球經貿聯繫完全中斷"], a:2},
    {q:"工業革命爆發前，歐洲大多數人主要是以什麼方式維持生計？", o:["在城鎮商店經商","在海外從事三角貿易","在礦場採煤","在農村務農"], a:3},
    {q:"根據反對資本主義剝削的學者理論，要徹底解決工業社會中的貧富懸殊，社會上的財富應該如何處理？", o:["由政府協助全數集中在資產階級手中","依照封建血統與爵位進行重新劃分","平均分配給社會大眾","交由教會進行慈善抽稅後統一保管"], a:2},
    {q:"到了十九世紀末，工業革命對全球經濟格局產生的最長遠影響是什麼？", o:["恢復了各國自給自足的封建莊園經濟","逐漸形成了一個以西方為中心的全球經濟體系","確立了以亞洲為核心的世界貿易網絡","導致全球工業生產中心完全轉移到非洲"], a:1},
    {q:"伴隨著大量工廠在城鎮設立，城市範圍不斷擴展，人口持續增長。這種社會結構的轉變在歷史學上被歸納為：", o:["農業化","都市化","莊園化","去工業化"], a:1},
    {q:"工業革命期間，哪一項醫學上的重大成就成功預防了當時在歐洲城鎮廣泛蔓延的烈性傳染病？", o:["盤尼西林的發明","現代麻醉藥的研發","高級抗生素的普及","天花疫苗的應用"], a:3},
    {q:"由於大型機器與現代化廠房的建造費用極其高昂，資本家為了募集更龐大的資金，通常會組織什麼型態的公司？", o:["獨資公司","無限責任會社","家族小工作坊","合股公司"], a:3},
    {q:"在工業革命後的社會中，律師、醫生與工程師等群體，主要是憑藉著什麼條件在社會上立足，並被歸類為中產階級？", o:["世襲的貴族爵位與封地","專門的知識與技術","擁有的工廠與礦產資源","朝廷賞賜的官職"], a:1},
    {q:"英國能夠成為工業革命的發源地，這與其政府在法律與政治制度上設立了哪一項保護創新的關鍵制度有關？", o:["發行股票募集資金制度","關稅壁壘保護制度","專利權制度","勞工權益保障法例"], a:2},
    {q:"工業革命前的歐洲，在沒有機器與現代交通工具的情況下，人類最主要的遠距離資訊傳遞方式是：", o:["郵遞","電報","電話","廣播"], a:0},
    {q:"到了工業革命後期，除了原有的煤炭之外，哪些新發現並被廣泛應用的能源，為工業生產提供了更強大的動力？", o:["木炭與薪柴","風力與水力","太陽能與核能","石油與電力"], a:3},
    {q:"在工業革命發展的前期，紡織業的機器主要是依靠哪一種改良後的動力來推動，從而打破了地理環境的限制？", o:["水力","石油動力","蒸汽力","人力"], a:2},
    {q:"西方工業強國透過建立現代交通網絡，從世界各地主要輸入什麼，加工後再向外輸出製成品？", o:["原材料","機器與設備","股票與債券","廉價勞動力"], a:0},
    {q:"資本家在擴充生產規模時，可以透過合股公司向公眾發行什麼金融工具來募集長期資金？", o:["專利權","疫苗","貨幣","債券"], a:3},
    {q:"工業革命後，資產階級積累了驚人的財富，而底層工人卻只能拿到微薄的薪酬，這直接導致了當時歐洲社會出現什麼嚴重的問題？", o:["總人口大幅減少","科技全面停滯","貧富懸殊","糧食嚴重短缺"], a:2},

// 老師的 15 題完整填充題庫 (已加入寬容異體字與同義詞判定)

    {q:"英國政府為了保護發明者權益、鼓勵技術創新而設立了特殊的法律保障，這項關鍵的制度稱為 ________ 制度。", a:["專利權", "專利", "專利權制度"]},

    {q:"工廠制度為了在最短時間內提高產出效率並確保產品質素，在生產流程中普遍引入了 ________ 制。", a:["分工", "分工制"]},
    {q:"馬克思與恩格斯所創立的學說，其最終目標是消滅私有制，建立一個由勞動階級掌權的社會，該理論被正式稱為 ________。", a:["共產主義"]},

    {q:"資本家組織合股公司，透過向大眾公開發行 ________ 來募集龐大資金，以此購買大型機器並進一步擴大生產規模。", a:["股票"]},
    {q:"工業革命發展後期，除了石油被廣泛開採外，另一項引發第二次技術變革並徹底重塑工廠照明與動力的高效能源是 ________。", a:["電力", "電"]},
    {q:"資本家將大量機器與大量工人集中在同一個現代化廠房內，進行集中管理與大規模生產的現代經濟運作模式稱為 ________ 制度。", a:["工廠", "工廠制度"]},
    {q:"隨著工業城鎮的大量建立，農村人口源源不絕地遷入，進而導致城鎮數量與面積出現爆炸性向外擴展的現象史稱 ________。", a:["城市化", "都市化"]}
];

let currentQuiz = [];
let currentIndex = 0;
let score = 0;
let totalSeconds = 0; 
let timerInterval;
let timeLeft;
let questionStartTime;
const studentData = { name: "", class: "" };

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        let temp = array[i]; array[i] = array[j]; array[j] = temp;
    }
    return array;
}

function startGame() {
    const cName = document.getElementById('student-class').value.trim();
    const sName = document.getElementById('student-name').value.trim();
    const sPass = document.getElementById('school-pass').value.trim();
    
    if(!cName || !sName || !sPass) { alert("⚠️ 所有欄位皆為必填！"); return; }
    if(sPass !== SCHOOL_PASSWORD) { alert("⚠️ 通關密碼錯誤，請詢問老師！"); return; }
    
    studentData.class = cName;
    studentData.name = sName;
    
    // 遊戲機制：隨機抽 15題 MC + 5題 填充
    let selectedMC = shuffle(allMC.slice()).slice(0, 15).map(function(q){ return {q: q.q, o: q.o, a: q.a, type: 0}; });
    let selectedFill = shuffle(allFill.slice()).slice(0, 5).map(function(q){ return {q: q.q, a: q.a, type: 1}; });
    currentQuiz = shuffle(selectedMC.concat(selectedFill));
    
    document.getElementById('login-screen').classList.add('hide');
    document.getElementById('game-screen').classList.remove('hide');
    loadQuestion();
}

function loadQuestion() {
    document.getElementById('rationale-area').style.display = "none";
    document.getElementById('next-btn-area').style.display = "none";
    const optArea = document.getElementById('options-area');
    optArea.innerHTML = "";
    
    if(currentIndex >= currentQuiz.length) { endGame(); return; }
    
    const qData = currentQuiz[currentIndex];
    document.getElementById('q-counter').innerText = currentIndex + 1;
    document.getElementById('question-area').innerText = "【第 " + (currentIndex + 1) + " 題】\n" + qData.q;
    
    if(qData.type === 0) {
        timeLeft = 30;
        const grid = document.createElement('div');
        grid.className = "options-grid";
        for(let idx = 0; idx < qData.o.length; idx++) {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = String.fromCharCode(65 + idx) + ". " + qData.o[idx];
            btn.onclick = function() { checkAnswer(idx, btn, qData); };
            grid.appendChild(btn);
        }
        optArea.appendChild(grid);
    } else {
        timeLeft = 40;
        const input = document.createElement('input');
        input.type = "text";
        input.className = "fill-input";
        input.placeholder = "請輸入中文答案...";
        input.id = "fill-ans";
        
        const subBtn = document.createElement('button');
        subBtn.className = "btn";
        subBtn.innerText = "提交答案";
        subBtn.onclick = function() { checkFillAnswer(qData); };
        
        optArea.appendChild(input);
        optArea.appendChild(document.createElement('br'));
        optArea.appendChild(subBtn);
        setTimeout(function() { input.focus(); }, 100);
    }
    
    document.getElementById('time-left').innerText = timeLeft;
    questionStartTime = new Date().getTime();
    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
    timeLeft--;
    document.getElementById('time-left').innerText = timeLeft;
    if(timeLeft <= 0) {
        clearInterval(timerInterval);
        totalSeconds += (new Date().getTime() - questionStartTime) / 1000;
        const qData = currentQuiz[currentIndex];
        
        if(qData.type === 0) {
            const btns = document.getElementById('options-area').getElementsByTagName('button');
            for(let i = 0; i < btns.length; i++) btns[i].disabled = true;
            btns[qData.a].classList.add('correct');
        } else {
            const inp = document.getElementById('fill-ans');
            if(inp) inp.disabled = true;
        }
        showRationale(qData, false);
    }
}

function checkAnswer(selectedIdx, btnElement, qData) {
    clearInterval(timerInterval);
    const timeUsed = (new Date().getTime() - questionStartTime) / 1000;
    totalSeconds += timeUsed;
    
    const btns = document.getElementById('options-area').getElementsByTagName('button');
    for(let i = 0; i < btns.length; i++) btns[i].disabled = true;
    
    const isCorrect = (selectedIdx === qData.a);
    if(isCorrect) {
        btnElement.classList.add('correct');
        score += (1000 + (timeLeft * 10));
        document.getElementById('score-display').innerText = score;
    } else {
        btnElement.classList.add('wrong');
        btns[qData.a].classList.add('correct');
    }
    showRationale(qData, isCorrect);
}

// 超強防呆填充題比對邏輯
function checkFillAnswer(qData) {
    const input = document.getElementById('fill-ans');
    const rawUserAns = input.value;
    if(!rawUserAns.trim()) return; 
    
    clearInterval(timerInterval);
    const timeUsed = (new Date().getTime() - questionStartTime) / 1000;
    totalSeconds += timeUsed;
    
    input.disabled = true;
    
    let standardizedUser = rawUserAns.replace(/[\s\(\)（）]/g, "").toLowerCase();
    let validAnswers = Array.isArray(qData.a) ? qData.a : [qData.a];
    let isCorrect = false;
    
    for(let i = 0; i < validAnswers.length; i++) {
        let standardizedCorrect = validAnswers[i].replace(/[\s\(\)（）]/g, "").toLowerCase();
        if(standardizedUser === standardizedCorrect) {
            isCorrect = true;
            break;
        }
    }
    
    if(isCorrect) {
        input.style.backgroundColor = "var(--correct)";
        input.style.color = "#fff";
        score += (1000 + (timeLeft * 15));
        document.getElementById('score-display').innerText = score;
    } else {
        input.style.backgroundColor = "var(--wrong)";
        input.style.color = "#fff";
        input.value = "答錯！正解: " + validAnswers[0];
    }
    showRationale(qData, isCorrect);
}

function showRationale(qData, isCorrect) {
    const ratArea = document.getElementById('rationale-area');
    ratArea.style.display = "block";
    ratArea.style.backgroundColor = isCorrect ? "#27ae60" : "#c0392b";
    
    let correctText = "";
    if (qData.type === 0) {
        correctText = qData.o[qData.a];
    } else {
        correctText = Array.isArray(qData.a) ? qData.a[0] : qData.a;
    }
    
    ratArea.innerHTML = "<strong>💡 歷史解說：</strong> 本題正確答案為「" + correctText + "」。";
    document.getElementById('next-btn-area').style.display = "block";
}

function loadNextQuestion() {
    currentIndex++;
    loadQuestion();
}

function endGame() {
    document.getElementById('game-screen').classList.add('hide');
    document.getElementById('result-screen').classList.remove('hide');
    
    const finalSec = Math.round(totalSeconds);
    document.getElementById('cert-name').innerText = studentData.name;
    document.getElementById('cert-class').innerText = studentData.class;
    document.getElementById('cert-score').innerText = score;
    document.getElementById('cert-time').innerText = finalSec;
    
    uploadScore(studentData.class, studentData.name, score, finalSec);
}

// 無縫上傳成績機制
function uploadScore(classStr, name, score, time) {
    const payload = { gameTitle: GAME_TITLE, classStr: classStr, name: name, score: score, time: time };

    fetch(CLOUD_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
    })
    .then(function() {
        document.getElementById('upload-status').innerText = "✅ 成績已成功同步！正在載入排行榜...";
        document.getElementById('upload-status').style.color = "var(--correct)";
        setTimeout(fetchLeaderboard, 1500); 
    })
    .catch(function(err) {
        document.getElementById('upload-status').innerText = "⚠️ 網路同步失敗，請點擊複製成績手動繳交。";
        document.getElementById('upload-status').style.color = "var(--wrong)";
    });
}

// 突破防線的 JSONP 排行榜抓取
function fetchLeaderboard() {
    const script = document.createElement('script');
    const callbackName = "showLeaderboard_" + Math.round(Math.random() * 1000000);
    
    window[callbackName] = function(data) {
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = "";
        
        if (data.error) {
            tbody.innerHTML = "<tr><td colspan='5' style='color:var(--wrong);'>⚠️ " + data.error + "</td></tr>";
        } else if (!data || data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5'>目前暫無排名，你就是第一位挑戰者！</td></tr>";
        } else {
            for (let i = 0; i < data.length; i++) {
                let tr = document.createElement('tr');
                let rankClass = (i < 3) ? "top-rank" : "";
                tr.innerHTML = "<td class='" + rankClass + "'>" + (i + 1) + "</td>" +
                               "<td>" + (data[i].classStr || "") + "</td>" +
                               "<td>" + (data[i].name || "") + "</td>" +
                               "<td>" + (data[i].score || 0) + "</td>" +
                               "<td>" + (data[i].time || 0) + "秒</td>";
                tbody.appendChild(tr);
            }
        }
        delete window[callbackName];
        script.remove();
    };

    script.src = CLOUD_URL + "?gameTitle=" + encodeURIComponent(GAME_TITLE) + "&callback=" + callbackName;
    document.body.appendChild(script);
}

function copyResult() {
    const text = "🏆 " + GAME_TITLE + "歷史挑戰賽成績\n姓名：" + studentData.class + " " + studentData.name + "\n得分：" + score + " 分\n耗時：" + Math.round(totalSeconds) + " 秒";
    navigator.clipboard.writeText(text).then(function() {
        alert("✅ 成績已複製！您可以直接至 Google Classroom 貼上交功課。");
    }).catch(function(err) {
        alert("無法自動複製，請手動圈選上方證書文字進行複製。");
    });
}
